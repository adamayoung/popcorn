name: Release Build

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-build:
    name: Build (Release)
    runs-on: macos-26
    timeout-minutes: 45
    env:
      XCODE_VERSION: "26.5"
      DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            .spm
            ~/Library/Caches/org.swift.swiftpm
            DerivedData
          key: ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-release-spm-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-release-spm-

      # Builds the app in the Release configuration, where `#if DEBUG` code is
      # excluded. This catches Release-only compile failures (e.g. a `#Preview`
      # referencing a DEBUG-only symbol) that the Debug `build-for-testing` jobs
      # miss, mirroring the Xcode Cloud archive build.
      - name: Build (Release)
        run: |
          NSUnbufferedIO=YES xcodebuild \
            -scheme Popcorn \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -skipMacroValidation \
            -clonedSourcePackagesDirPath .spm \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build
