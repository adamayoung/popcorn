name: Claude Code

on:
  pull_request:
    types: [opened, synchronize]
    # Only run the automated code review when the PR actually changes Swift
    # source (or a package manifest). Docs-only, config-only, or .claude/
    # changes carry nothing to review, so the review job doesn't trigger at all.
    # @claude can still be invoked manually via a comment (the claude-respond
    # job, which is not path-filtered).
    paths:
      - '**/*.swift'
      - '**/Package.resolved'
      - '**/Package.swift'
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# A new push (synchronize) supersedes the in-flight review for the same PR — cancel
# it so reviews don't stack up and double-post while watch-pr iterates. The group is
# keyed by event type as well as PR number so a comment-triggered run can't cancel an
# in-flight push-triggered review.
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Automated PR code review — repo owner's PRs only, never forks (a write-capable
    # token must not be driven by untrusted fork content).
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false &&
      github.event.sender.login == 'adamayoung'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(cat:*),Read,Glob,Grep"'
          prompt: |
            You are the GitHub Actions reviewer for the Popcorn SwiftUI app. Review
            this PR by following the project's canonical review guidelines, then post
            your findings as described below.

            ## Follow the canonical guidelines

            Read and follow `.github/CODE_REVIEW.md` (it is checked out in the
            workspace). It is the SINGLE SOURCE OF TRUTH shared with the local
            `code-reviewer` agent, so the two reviews stay aligned. It defines the
            goal, severity rubric, project context/architecture, in/out scope, and the
            output shape. Read the `docs/*.md` it points at as needed. Do not invent
            criteria — the file wins.

            ## Your environment (no MCP, no build/test) — review only what you can verify

            You have the diff and the checked-out repo, but NO MCP, NO Xcode build, and
            NO test or snapshot run. Per the "capability scope" section of the
            guidelines: review what the code itself shows, and do NOT post speculative
            findings. In particular, do NOT raise "tests/snapshots would fail", whether
            a view renders correctly, TMDb-mapping accuracy, or runtime-behaviour issues
            — you cannot verify them here; leave those to the local reviewer. At most
            mention "verify locally" in the summary.

            ## Adversarial re-evaluation is MANDATORY

            After your first pass, challenge every finding against the actual code (see
            the guidelines' adversarial section): verify it's real, downgrade or drop
            theoretical/false-positive/out-of-scope findings, and confirm it relates to
            this diff. Only findings that SURVIVE this pass may be posted. This is the
            filter that keeps the review quiet and trustworthy — apply it strictly.
            (A documented-convention violation stays at severity even if sibling code
            repeats it — only drop findings that are factually wrong.)

            ## Where findings go (severity-gated — important)

            - **Inline comments** (via `create_inline_comment`): post ONLY surviving
              **Critical** and **High** findings, on the specific line. Use GitHub
              suggestion blocks for concrete fixes. These are the blocking, actionable
              issues.
            - **One summary comment** (via `gh pr comment`): everything else — **Medium**
              and **Low** findings (as a brief list, NOT inline threads), the
              **Strengths**, and the **Assessment** (Ready to merge? + reason).

            Do not create inline review threads for Medium/Low — they become noise that
            downstream automation must chase. Keep them advisory in the summary. If
            nothing Critical/High survives, post no inline comments and say so in the
            summary. Be concise and actionable; never mark a nitpick Critical.

  claude-respond:
    # Manual @claude mentions in issues, PR comments, and reviews — owner only.
    if: |
      (github.event_name == 'issue_comment' && github.event.comment.user.login == 'adamayoung' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && github.event.comment.user.login == 'adamayoung' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && github.event.review.user.login == 'adamayoung' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.sender.login == 'adamayoung' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          # Allow Claude to read CI results on PRs.
          additional_permissions: |
            actions: read
