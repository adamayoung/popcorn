name: UI Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ios-uitest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-tests:
    name: Build and UI Test
    runs-on: macos-26
    timeout-minutes: 45
    env:
      XCODE_VERSION: "26.3"
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
      SIMULATOR_NAME: "iPhone 17 Pro"
      IOS_VERSION: "26.2"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            .spm
            ~/Library/Caches/org.swift.swiftpm
            DerivedData
          key: ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-spm-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-spm-

      - name: Create Secrets
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          printf 'TMDB_API_KEY = %s\n' "$TMDB_API_KEY" > Configs/Secrets.xcconfig

      - name: Build
        run: |
          NSUnbufferedIO=YES xcodebuild \
            -scheme Popcorn \
            -destination "platform=iOS Simulator,name=${{ env.SIMULATOR_NAME }},OS=${{ env.IOS_VERSION }}" \
            -skipMacroValidation \
            -testPlan PopcornUITests \
            -clonedSourcePackagesDirPath .spm \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build-for-testing

      - name: UI Test
        run: |
          NSUnbufferedIO=YES xcodebuild \
            -scheme Popcorn \
            -destination "platform=iOS Simulator,name=${{ env.SIMULATOR_NAME }},OS=${{ env.IOS_VERSION }}" \
            -skipMacroValidation \
            -testPlan PopcornUITests \
            -clonedSourcePackagesDirPath .spm \
            -derivedDataPath DerivedData \
            -resultBundlePath UITestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            test-without-building

      - name: Collect crash logs
        if: failure()
        run: |
          DEVICE_ID=$(xcrun simctl list devices | grep "${{ env.SIMULATOR_NAME }}" | grep -oE '[A-F0-9-]{36}' | head -1)
          echo "Simulator device: $DEVICE_ID"

          echo "=== App crash logs ==="
          find ~/Library/Logs/DiagnosticReports -name "Popcorn*" -newer UITestResults.xcresult 2>/dev/null -exec cat {} \; || true

          echo "=== Simulator system log (Popcorn) ==="
          xcrun simctl spawn "$DEVICE_ID" log show --style compact --last 10m \
            --predicate 'process == "Popcorn" AND (messageType == error OR messageType == fault)' 2>/dev/null | tail -100 || true

      - name: Archive test results
        if: failure()
        run: |
          if [ -d UITestResults.xcresult ]; then
            zip -r -q UITestResults.xcresult.zip UITestResults.xcresult
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: UITestResults.xcresult.zip
