name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Only review PRs from the repository owner and never from forks. This
    # prevents untrusted fork PR content from driving the write-capable token
    # (a prompt-injection vector).
    if: |
      github.event.pull_request.head.repo.fork == false &&
      github.event.pull_request.user.login == 'adamayoung'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request following the shared spec at `.github/CODE_REVIEW.md`
            (read it first) — it lists the review dimensions, the source-of-truth docs
            (`docs/*.md`), and the severity rubric. Cover correctness & safety,
            concurrency, architecture, SwiftUI, SwiftData/CloudKit, testing, and the
            project-specific checks it names.

            Use `.github/CODE_REVIEW.md` and the repository's CLAUDE.md / docs for guidance
            on conventions. Review only when the change touches Swift. Be constructive.

            ## How to submit your review

            Submit your review as a **GitHub pull request review with inline comments** on the changed lines.

            1. Use `gh pr diff ${{ github.event.pull_request.number }}` to get the diff.
            2. For each finding, identify the exact file path and line number in the HEAD commit.
            3. Build a JSON review payload and submit it with `gh api`:

            ```bash
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              -X POST \
              --input review.json
            ```

            The review.json should have this structure:
            ```json
            {
              "event": "COMMENT",
              "body": "## Code Review\n\nOverall summary here.",
              "comments": [
                {
                  "path": "relative/path/to/file.swift",
                  "line": 42,
                  "body": "**[High]** Description of the issue."
                }
              ]
            }
            ```

            Rules:
            - The `line` must be a line number that appears in the diff (i.e. added or context lines in the HEAD version).
            - Use `path` relative to the repo root (e.g. `Features/Foo/Sources/Bar.swift`).
            - Prefix each comment body with a severity tag from the `.github/CODE_REVIEW.md` rubric: `[Critical]`, `[High]`, `[Medium]`, or `[Low]`.
            - The top-level `body` should contain an overall summary with a table of all findings.
            - Do NOT use `gh pr comment` — always use the review API for inline comments.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh api:*)"'
